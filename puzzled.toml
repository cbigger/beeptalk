# beeper-harmonic-minor.toml
#
# A harmonic minor: A B C D E F G#
# Raised 7th (G → G#) gives it that tense, dramatic, quasi-Middle-Eastern character.
# 3 octaves (A3–G#6), 21 notes. Indices 21–25 wrap back to A3.

[audio]
sample_rate = 44100
volume      = 0.4
attack_ms   = 6
decay_ms    = 6

[pitch]
scale_frequencies = [
  220.00,   # A3
  246.94,   # B3
  261.63,   # C4
  293.66,   # D4
  329.63,   # E4
  349.23,   # F4
  415.30,   # G#4
  440.00,   # A4
  493.88,   # B4
  523.25,   # C5
  587.33,   # D5
  659.25,   # E5
  698.46,   # F5
  830.61,   # G#5
  880.00,   # A5
  987.77,   # B5
  1046.50,  # C6
  1174.66,  # D6
  1318.51,  # E6
  1396.91,  # F6
  1661.22,  # G#6
]

[pitch.letter_indices]
a =  0
b =  1
c =  2
d =  3
e =  4
f =  5
g =  6
h =  7
i =  8
j =  9
