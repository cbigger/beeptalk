# beeper-chromatic.toml
#
# "Amodal" mapping: 26 frequencies linearly spaced from low B (B3) to high C (C6).
# No scale or key — every letter gets its own unique pitch. Sounds more alien/robotic.

[audio]
sample_rate = 44100
volume      = 0.4
attack_ms   = 6
decay_ms    = 6

[pitch]
scale_frequencies = [
  246.94,   # index 0
  278.92,
  310.90,
  342.89,
  374.87,
  406.85,
  438.83,
  470.82,
  502.80,
  534.78,
  566.76,
  598.75,
  630.73,
  662.71,
  694.69,
  726.68,
  758.66,
  790.64,
  822.62,
  854.61,
  886.59,
  918.57,
  950.55,
  982.54,
  1014.52,
  1046.50,  # index 25
]

[pitch.letter_indices]
a =  0
b =  1
c =  2
d =  3
e =  4
f =  5
g =  6
h =  7
i =  8
j =  9
k = 10
l = 11
m = 12
n = 13
o = 14
p = 15
q = 16
r = 17
s = 18
t = 19
u = 20
v = 21
w = 22
x = 23
y = 24
z = 25

[duration]
ms_per_letter = 60
min_ms        = 50
max_ms        = 600

[silence]
space_ms = 40
comma_ms = 80
other_ms = 160

[language]
pyphen_lang = "en_US"
